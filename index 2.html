<!DOCTYPE html>
<html>
<head>

<title>Barber 88</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

html{
scroll-behavior:smooth;
}

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

/* HEADER */

header{
background:black;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:2px solid gold;
position:sticky;
top:0;
}

.logo{
font-size:30px;
color:gold;
font-weight:bold;
}

nav a{
color:white;
margin-left:20px;
text-decoration:none;
}

nav a:hover{
color:gold;
}

/* HERO */

.hero{
background:url("https://images.unsplash.com/photo-1622286342621-4bd786c2447c");
background-size:cover;
background-position:center;
height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero h1{
font-size:60px;
margin-bottom:10px;
}

/* BUTTON */

.button{
background:linear-gradient(45deg,gold,#c9a300);
color:black;
padding:16px 35px;
font-weight:bold;
border-radius:30px;
text-decoration:none;
box-shadow:0 10px 20px rgba(255,215,0,0.3);
transition:0.3s;
}

.button:hover{
transform:translateY(-3px);
box-shadow:0 15px 35px rgba(255,215,0,0.6);
}

/* SECTIONS */

section{
padding:70px 20px;
text-align:center;
}

/* TITLE GOLD LINE */

h2{
position:relative;
display:inline-block;
}

h2:after{
content:"";
display:block;
width:60px;
height:3px;
background:gold;
margin:10px auto;
}

/* DIVIDER */

.divider{
height:3px;
width:120px;
background:gold;
margin:40px auto;
border-radius:5px;
}

/* SERVICES */

.services{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.service{
background:#1a1a1a;
padding:25px;
width:220px;
border-radius:10px;
transition:0.3s;
}

.service:hover{
transform:translateY(-8px);
box-shadow:0 15px 30px rgba(0,0,0,0.6);
}

/* GALLERY */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:12px;
}

.gallery img{
width:100%;
border-radius:6px;
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.07);
}

/* CONTACT */

.contact-box{
background:#1a1a1a;
padding:30px;
max-width:500px;
margin:auto;
border-radius:10px;
}

/* FOOTER */

footer{
background:black;
padding:30px;
border-top:2px solid gold;
text-align:center;
}

</style>

</head>

<body>

<header>

<div class="logo">Barber 88</div>

<nav>
<a href="#">Home</a>
<a href="#services">Services</a>
<a href="#gallery">Gallery</a>
<a href="#contact">Contact</a>
</nav>

</header>

<div class="hero">

<h1>Barber 88</h1>

<p>Phoenix's Home For Clean Fades</p>

<a class="button" href="#">Book Appointment</a>

</div>

<div class="divider"></div>

<section id="services">

<h2>Our Services</h2>

<div class="services">

<div class="service">
<h3>Haircut</h3>
<p>$30</p>
</div>

<div class="service">
<h3>Skin Fade</h3>
<p>$35</p>
</div>

<div class="service">
<h3>Haircut + Beard</h3>
<p>$45</p>
</div>

<div class="service">
<h3>Kids Cut</h3>
<p>$25</p>
</div>

</div>

</section>

<div class="divider"></div>

<section id="gallery">

<h2>Gallery</h2>

<div class="gallery">

<img src="https://images.unsplash.com/photo-1621605815971-fbc98d665033">
<img src="https://images.unsplash.com/photo-1593702288056-f86a3c3f0c52">
<img src="https://images.unsplash.com/photo-1585747860715-ebba7e5c2c3f">
<img src="https://images.unsplash.com/photo-1599351431405-75c3bbd24c2b">

</div>

</section>

<div class="divider"></div>

<section id="contact">

<h2>Visit Barber 88</h2>

<div class="contact-box">

<p>Phoenix, Arizona</p>

<p>(602) 555-8888</p>

<br>

<a class="button" href="#">Book Appointment</a>

</div>

</section>

<footer>

<p>© 2026 Barber 88</p>

</footer>

</body>
</html>
